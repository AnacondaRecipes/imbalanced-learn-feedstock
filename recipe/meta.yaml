{% set name = "imbalanced-learn" %}
{% set version = "0.14.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace("-", "_") }}-{{ version }}.tar.gz
  sha256: 46eeb5773a96b6fa92426356da66f3e4390a7ed8e715a633c6fb68ee4a3ccdcb

build:
  number: 2
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<310]

requirements:
  host:
    - python
    - setuptools >=71
    - pip
    - toml
    - setuptools-scm >=8
  run:
    - python
    - numpy >=1.25.2,<3
    - scipy >=1.11.4,<2
    - scikit-learn >=1.4.2,<2
    - sklearn-compat >=0.1.5,<0.2
    - joblib >=1.2.0,<2
    - threadpoolctl >=2.0.0,<4
  run_constrained:
    - pandas >=2.0.3,<4 # loosen upper bound
    - tensorflow >=2.16.1,<3
    - keras >=3.3.3,<4

{% set deselect_tests = "" %}
# scikit-learn <1.7 not available for py314 in the main channel
{% set deselect_tests = " --deselect=test_common.py::test_estimators_compatibility_sklearn" %}  # [py==314]
{% set deselect_tests = deselect_tests + " --deselect=test_common.py::test_pandas_column_name_consistency" %}  # [py==314]
{% set deselect_tests = deselect_tests + " --deselect=test_common.py::test_estimators_imblearn" %}  # [py==314]

test:
  requires:
    - pip
    - pytest >=7.2.2,<9
    - pytest-timeout
    - pytest-xdist >=3.5.0,<4
    # _validate_y_class_weight gained the sample_weight added in sklearn 1.7+
    # Added upper-bound updated to fix tests
    - scikit-learn <1.7  # [py<314]
    - pandas
  imports:
    - imblearn
  commands:
    - pip check
    - pytest --pyargs imblearn.tests {{ deselect_tests }}

about:
  home: https://imbalanced-learn.org
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Python module to balance data set using under- and over-sampling
  description: |
    imbalanced-learn is a python package offering a number of re-sampling
    techniques commonly used in datasets showing strong between-class imbalance.
    It is compatible with scikit-learn and is part of scikit-learn-contrib
    projects.
  doc_url: https://imbalanced-learn.org/stable
  dev_url: https://github.com/scikit-learn-contrib/imbalanced-learn

extra:
  recipe-maintainers:
    - glemaitre
